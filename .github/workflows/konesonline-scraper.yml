name: Konesonline Daily Scraper

on:
  schedule:
    # Daily at 07:00 UTC (10:00 Israel time)
    - cron: '0 7 * * *'
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual trigger'
        required: false
        default: 'Manual scrape'

jobs:
  scrape-konesonline:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Trigger Konesonline scrape via Railway API
        env:
          RAILWAY_API_URL: ${{ secrets.RAILWAY_API_URL }}
        run: |
          python3 << 'PYEOF'
          import urllib.request, json, os, sys, time

          API_URL = os.environ.get('RAILWAY_API_URL', 'https://pinuy-binuy-analyzer-production.up.railway.app')
          
          print(f"[KonesonlineScraper] Triggering scrape via Railway API: {API_URL}")
          print(f"[KonesonlineScraper] Reason: ${{ github.event.inputs.reason || 'Scheduled daily scrape' }}")
          
          # Call the Railway /api/kones/scrape-konesonline endpoint
          # Railway's server does the actual scraping (not blocked by Cloudflare)
          req = urllib.request.Request(
              f"{API_URL}/api/kones/scrape-konesonline",
              data=b'{}',
              headers={
                  'Content-Type': 'application/json',
                  'User-Agent': 'GitHub-Actions-Konesonline-Scraper/1.0',
              },
              method='POST'
          )
          
          try:
              print(f"[KonesonlineScraper] Sending request to Railway...")
              resp = urllib.request.urlopen(req, timeout=120)
              result = json.loads(resp.read().decode('utf-8'))
              
              if result.get('success'):
                  scrape = result.get('scrape', {})
                  total = scrape.get('total', 0)
                  imported = scrape.get('imported', 0)
                  skipped = scrape.get('skipped', 0)
                  db_total = result.get('konesonlineTotalInDB', 0)
                  
                  print(f"[KonesonlineScraper] ✅ SUCCESS!")
                  print(f"[KonesonlineScraper] Scraped: {total} listings from konesonline.co.il")
                  print(f"[KonesonlineScraper] Imported: {imported} new listings")
                  print(f"[KonesonlineScraper] Skipped: {skipped} (already in DB)")
                  print(f"[KonesonlineScraper] Total in DB: {db_total} konesonline listings")
                  print(f"[KonesonlineScraper] Message: {result.get('message', '')}")
              else:
                  error = result.get('error', 'Unknown error')
                  print(f"[KonesonlineScraper] ⚠️ API returned failure: {error}")
                  # Don't fail the workflow - Railway may have had a temporary issue
                  sys.exit(0)
                  
          except urllib.error.HTTPError as e:
              body = e.read().decode('utf-8', errors='replace')[:200]
              print(f"[KonesonlineScraper] ⚠️ HTTP {e.code}: {body}")
              # Exit 0 to avoid red failure emails for temporary issues
              sys.exit(0)
          except urllib.error.URLError as e:
              print(f"[KonesonlineScraper] ⚠️ Connection error: {e.reason}")
              sys.exit(0)
          except Exception as e:
              print(f"[KonesonlineScraper] ⚠️ Unexpected error: {type(e).__name__}: {e}")
              sys.exit(0)
          PYEOF

      - name: Report results
        if: always()
        run: |
          echo "Konesonline scraper workflow completed at $(date -u)"
