name: Publish Zenodo DOI

on:
  workflow_dispatch:
    inputs:
      sandbox:
        description: Use sandbox
        required: false
        default: 'false'
      draft:
        description: Draft only
        required: false
        default: 'false'

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Run publish script
        env:
          ZENODO_ACCESS_TOKEN: ${{ secrets.ZENODO_ACCESS_TOKEN }}
        run: |
          node scripts/publish_to_zenodo.js
