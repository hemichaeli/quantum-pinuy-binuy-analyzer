<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>פינוי-בינוי Phone Collector</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 320px;
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      direction: rtl;
    }
    .header {
      background: linear-gradient(135deg, #1e40af, #7c3aed);
      padding: 14px 16px;
      text-align: center;
    }
    .header h1 { font-size: 14px; font-weight: 700; color: white; }
    .header p { font-size: 11px; color: #bfdbfe; margin-top: 2px; }
    .status-bar {
      background: #1e293b;
      padding: 7px 16px;
      display: flex;
      align-items: center;
      gap: 8px;
      border-bottom: 1px solid #334155;
    }
    .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #22c55e;
      animation: pulse 2s infinite;
    }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    .status-text { font-size: 11px; color: #94a3b8; }
    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 1px;
      background: #334155;
    }
    .stat-box {
      background: #1e293b;
      padding: 10px 8px;
      text-align: center;
    }
    .stat-num { font-size: 20px; font-weight: 700; color: #60a5fa; }
    .stat-label { font-size: 10px; color: #64748b; margin-top: 2px; }
    .section {
      padding: 10px 16px;
      border-bottom: 1px solid #1e293b;
    }
    .section-title {
      font-size: 10px;
      font-weight: 600;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 6px;
    }
    .platform-list { display: flex; flex-direction: column; gap: 3px; }
    .platform-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 5px 8px;
      background: #0f172a;
      border-radius: 5px;
      font-size: 12px;
    }
    .platform-name { color: #cbd5e1; }
    .platform-badge {
      font-size: 10px;
      padding: 1px 6px;
      border-radius: 10px;
      font-weight: 600;
    }
    .badge-active { background: #14532d; color: #4ade80; }
    .badge-extension { background: #1e3a5f; color: #60a5fa; }
    .last-phone {
      background: #0f172a;
      border-radius: 6px;
      padding: 7px 10px;
      font-size: 13px;
      color: #4ade80;
      font-family: monospace;
      text-align: center;
      letter-spacing: 0.05em;
    }
    .btn {
      width: 100%;
      padding: 9px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-primary { background: #2563eb; color: white; }
    .btn-primary:hover { background: #1d4ed8; }
    .btn-secondary {
      background: #1e293b;
      color: #94a3b8;
      border: 1px solid #334155;
      margin-top: 5px;
    }
    .btn-secondary:hover { background: #334155; }
    .log {
      background: #0f172a;
      border: 1px solid #1e293b;
      border-radius: 5px;
      padding: 6px 8px;
      font-size: 10px;
      color: #475569;
      max-height: 60px;
      overflow-y: auto;
      margin-top: 6px;
      direction: ltr;
      font-family: monospace;
    }
    .footer {
      padding: 7px 16px;
      text-align: center;
      font-size: 10px;
      color: #334155;
    }
    .footer a { color: #3b82f6; text-decoration: none; }
  </style>
</head>
<body>
  <div class="header">
    <h1>📞 פינוי-בינוי Phone Collector</h1>
    <p>QUANTUM v2.0 | איסוף טלפונים אוטומטי</p>
  </div>
  
  <div class="status-bar">
    <div class="status-dot" id="statusDot"></div>
    <span class="status-text" id="statusText">מחובר לשרת</span>
  </div>
  
  <div class="stats-grid">
    <div class="stat-box">
      <div class="stat-num" id="statSent">0</div>
      <div class="stat-label">נשלחו</div>
    </div>
    <div class="stat-box">
      <div class="stat-num" id="statPhones">0</div>
      <div class="stat-label">טלפונים</div>
    </div>
    <div class="stat-box">
      <div class="stat-num" id="statErrors">0</div>
      <div class="stat-label">שגיאות</div>
    </div>
  </div>
  
  <div class="section">
    <div class="section-title">טלפון אחרון שנמצא</div>
    <div class="last-phone" id="lastPhone">—</div>
  </div>
  
  <div class="section">
    <div class="section-title">פלטפורמות</div>
    <div class="platform-list">
      <div class="platform-item">
        <span class="platform-name">Yad2 / Nadlan / Mavat</span>
        <span class="platform-badge badge-active">שרת ✅</span>
      </div>
      <div class="platform-item">
        <span class="platform-name">Komo</span>
        <span class="platform-badge badge-extension">Extension ✅</span>
      </div>
      <div class="platform-item">
        <span class="platform-name">Homeless</span>
        <span class="platform-badge badge-extension">Extension ✅</span>
      </div>
      <div class="platform-item">
        <span class="platform-name">Yad1</span>
        <span class="platform-badge badge-extension">Extension ✅</span>
      </div>
      <div class="platform-item">
        <span class="platform-name">Winwin</span>
        <span class="platform-badge badge-extension">Extension ✅</span>
      </div>
      <div class="platform-item">
        <span class="platform-name">Madlan</span>
        <span class="platform-badge badge-extension">Extension ✅</span>
      </div>
    </div>
  </div>
  
  <div class="section">
    <button class="btn btn-primary" id="btnScrape">🔍 סרוק דף נוכחי</button>
    <button class="btn btn-secondary" id="btnDashboard">📊 פתח Dashboard</button>
    <div class="log" id="log">מוכן לסריקה...</div>
  </div>
  
  <div class="footer">
    <a href="https://pinuy-binuy-analyzer-production.up.railway.app" target="_blank">QUANTUM Dashboard</a>
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
