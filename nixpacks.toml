# Nixpacks configuration for Railway deployment
# Required for Puppeteer/Chromium headless browser

[phases.setup]
nixPkgs = [
  "nodejs_18",
  "chromium",
  "nss",
  "freetype",
  "harfbuzz",
  "ca-certificates",
  "fontconfig"
]

[phases.install]
cmds = ["npm ci"]

[phases.build]
# cache-bust: 20260310031256
cmds = ["find . -name '*.gz.b64' -not -name 'dashboardRoutes.js.gz.b64' -delete && echo 'Removed stale gz.b64 files'"]

[start]
cmd = "node start.js"

[variables]
PUPPETEER_SKIP_CHROMIUM_DOWNLOAD = "true"
