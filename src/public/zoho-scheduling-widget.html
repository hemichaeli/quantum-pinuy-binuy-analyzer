<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>QUANTUM — בוט תיאום פגישות</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #0a0a0f;
      color: #e2e8f0;
      direction: rtl;
      padding: 16px;
      min-height: 100vh;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
      padding-bottom: 14px;
      border-bottom: 1px solid #1e293b;
    }
    .logo { font-size: 11px; letter-spacing: 3px; color: #60a5fa; text-transform: uppercase; }
    h1 { font-size: 16px; color: #f1f5f9; font-weight: 700; }
    .section { background: #111827; border: 1px solid #1e293b; border-radius: 12px; padding: 16px; margin-bottom: 14px; }
    .section h2 { font-size: 13px; font-weight: 700; color: #94a3b8; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 14px; }
    label { display: block; font-size: 12px; color: #94a3b8; margin-bottom: 5px; }
    input, select, textarea {
      width: 100%;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 6px;
      color: #e2e8f0;
      padding: 8px 10px;
      font-size: 13px;
      margin-bottom: 12px;
      font-family: inherit;
    }
    textarea { min-height: 70px; resize: vertical; }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 10px 18px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      border: none;
      transition: all 0.2s;
    }
    .btn-primary {
      background: linear-gradient(135deg, #1e40af, #3b82f6);
      color: #fff;
      width: 100%;
      justify-content: center;
      font-size: 14px;
      padding: 13px;
      margin-top: 4px;
    }
    .btn-primary:hover { background: linear-gradient(135deg, #1d4ed8, #60a5fa); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-secondary {
      background: #1e293b;
      border: 1px solid #334155;
      color: #94a3b8;
      font-size: 12px;
      padding: 7px 12px;
    }
    .kpis {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-bottom: 14px;
    }
    .kpi {
      background: #0f172a;
      border: 1px solid #1e293b;
      border-radius: 8px;
      padding: 10px;
      text-align: center;
    }
    .kpi-val { font-size: 22px; font-weight: 800; }
    .kpi-val.green { color: #34d399; }
    .kpi-val.blue { color: #60a5fa; }
    .kpi-val.yellow { color: #fbbf24; }
    .kpi-val.red { color: #f87171; }
    .kpi-label { font-size: 10px; color: #64748b; margin-top: 3px; }
    .contact-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      border-bottom: 1px solid #1e293b;
      font-size: 12px;
    }
    .contact-row:last-child { border-bottom: none; }
    .contact-name { flex: 1; font-weight: 600; }
    .contact-phone { color: #64748b; min-width: 100px; }
    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 10px;
      font-weight: 700;
    }
    .badge-pending { background: #451a03; color: #fbbf24; }
    .badge-confirmed { background: #064e3b; color: #34d399; }
    .badge-declined { background: #450a0a; color: #f87171; }
    .badge-sent { background: #1e3a5f; color: #60a5fa; }
    .badge-error { background: #450a0a; color: #f87171; }
    .status-bar {
      background: #0f172a;
      border: 1px solid #1e293b;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 12px;
      color: #94a3b8;
      margin-top: 12px;
      min-height: 40px;
    }
    .status-bar.success { border-color: #064e3b; color: #34d399; }
    .status-bar.error { border-color: #450a0a; color: #f87171; }
    .status-bar.loading { color: #60a5fa; }
    .progress-bar-wrap { background: #1e293b; border-radius: 4px; height: 6px; margin-top: 8px; overflow: hidden; }
    .progress-bar { background: #3b82f6; height: 100%; border-radius: 4px; transition: width 0.3s; }
    .contacts-list { max-height: 220px; overflow-y: auto; }
    .empty { color: #64748b; font-size: 12px; padding: 12px; text-align: center; }
    .row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .tabs { display: flex; gap: 6px; margin-bottom: 14px; }
    .tab { padding: 7px 14px; border-radius: 6px; font-size: 12px; font-weight: 600; cursor: pointer; border: 1px solid #334155; background: #1e293b; color: #94a3b8; }
    .tab.active { background: #1e40af; border-color: #3b82f6; color: #fff; }
    .separator { border: none; border-top: 1px solid #1e293b; margin: 14px 0; }
  </style>
</head>
<body>

<div class="header">
  <div>
    <div class="logo">⚡ QUANTUM Intelligence</div>
    <h1>בוט תיאום פגישות</h1>
  </div>
</div>

<!-- TABS -->
<div class="tabs">
  <div class="tab active" id="tab-btn-launch" onclick="showTab('launch')">🚀 הפעלה</div>
  <div class="tab" id="tab-btn-status" onclick="showTab('status')">📊 סטטוס</div>
  <div class="tab" id="tab-btn-config" onclick="showTab('config')">⚙️ הגדרות</div>
</div>

<!-- ═══════════════════════════════════════════════════════════ -->
<!-- TAB: LAUNCH                                                 -->
<!-- ═══════════════════════════════════════════════════════════ -->
<div id="panel-launch">

  <div class="section">
    <h2>📋 פרטי קמפיין</h2>
    <label>מזהה קמפיין Zoho *</label>
    <input type="text" id="campaignId" placeholder="לדוגמה: 3000000012345" />

    <div class="row-2">
      <div>
        <label>סוג פגישה</label>
        <select id="meetingType">
          <option value="signing_ceremony">כנס חתימות</option>
          <option value="consultation">פגישת ייעוץ</option>
          <option value="appraiser">ביקור שמאי</option>
          <option value="surveyor">ביקור מודד</option>
          <option value="physical">פגישה פיזית</option>
        </select>
      </div>
      <div>
        <label>שפה</label>
        <select id="language">
          <option value="he">🇮🇱 עברית</option>
          <option value="ru">🇷🇺 רוסית</option>
          <option value="both">שתיהן</option>
        </select>
      </div>
    </div>

    <label>הודעה ראשונית (אופציונלי — ישתמש בברירת מחדל אם ריק)</label>
    <textarea id="customTemplate" placeholder="שלום {name} 👋&#10;QUANTUM כאן. אנחנו מוכנים לתאם {type} עבור דירתך.&#10;ענה/י 1 ונתאם עכשיו."></textarea>
  </div>

  <div class="section" id="contacts-section">
    <h2>👥 אנשי קשר לשליחה</h2>
    <div style="display:flex;gap:8px;margin-bottom:10px;">
      <button class="btn btn-secondary" onclick="loadContacts()">📥 טען מ-Zoho CRM</button>
      <button class="btn btn-secondary" onclick="document.getElementById('csv-upload').click()">📂 העלה CSV</button>
      <input type="file" id="csv-upload" accept=".csv" style="display:none" onchange="handleCSV(event)">
    </div>
    <div id="contacts-list" class="contacts-list">
      <div class="empty">לחץ "טען מ-Zoho CRM" או העלה קובץ CSV</div>
    </div>
    <div id="contacts-count" style="font-size:11px;color:#64748b;margin-top:6px;"></div>
  </div>

  <button class="btn btn-primary" id="launch-btn" onclick="launchBot()" disabled>
    🚀 הפעל בוט תיאום
  </button>

  <div class="status-bar" id="launch-status">ממתין להפעלה...</div>
  <div class="progress-bar-wrap" id="progress-wrap" style="display:none;">
    <div class="progress-bar" id="progress-bar" style="width:0%"></div>
  </div>
</div>

<!-- ═══════════════════════════════════════════════════════════ -->
<!-- TAB: STATUS                                                 -->
<!-- ═══════════════════════════════════════════════════════════ -->
<div id="panel-status" style="display:none;">

  <div class="section">
    <h2>📊 סטטוס קמפיין</h2>
    <label>מזהה קמפיין לבדיקה</label>
    <div style="display:flex;gap:8px;">
      <input type="text" id="status-campaignId" placeholder="מזהה קמפיין" style="margin-bottom:0;">
      <button class="btn btn-secondary" onclick="loadStatus()" style="white-space:nowrap;">🔍 בדוק</button>
    </div>
  </div>

  <div id="status-kpis" class="kpis" style="display:none;"></div>

  <div class="section" id="status-contacts-section" style="display:none;">
    <h2>👥 אנשי קשר</h2>
    <div id="status-contacts-list" class="contacts-list"></div>
  </div>

  <div class="status-bar" id="status-bar">הזן מזהה קמפיין ולחץ בדוק</div>
</div>

<!-- ═══════════════════════════════════════════════════════════ -->
<!-- TAB: CONFIG                                                 -->
<!-- ═══════════════════════════════════════════════════════════ -->
<div id="panel-config" style="display:none;">
  <div class="section">
    <h2>⚙️ הגדרות קמפיין</h2>
    <label>מזהה קמפיין *</label>
    <input type="text" id="cfg-campaignId" placeholder="מזהה קמפיין Zoho" />

    <label>מזהה פרויקט</label>
    <input type="number" id="cfg-projectId" placeholder="מזהה פרויקט DB" />

    <div class="row-2">
      <div>
        <label>משך פגישה (דקות)</label>
        <input type="number" id="cfg-slotDuration" value="45" />
      </div>
      <div>
        <label>הפסקה בין פגישות</label>
        <input type="number" id="cfg-buffer" value="15" />
      </div>
    </div>

    <div class="row-2">
      <div>
        <label>תזכורת ראשונה (שעות)</label>
        <input type="number" id="cfg-reminder" value="24" />
      </div>
      <div>
        <label>Vapi fallback (שעות)</label>
        <input type="number" id="cfg-vapi" value="48" />
      </div>
    </div>

    <label>שפה ברירת מחדל</label>
    <select id="cfg-lang">
      <option value="he">עברית</option>
      <option value="ru">רוסית</option>
    </select>

    <button class="btn btn-primary" onclick="saveConfig()">💾 שמור הגדרות</button>
    <div class="status-bar" id="config-status" style="margin-top:10px;">ממתין...</div>
  </div>
</div>

<script>
  // ── Config ─────────────────────────────────────────────────
  const API_BASE = 'https://pinuy-binuy-analyzer-production.up.railway.app';
  let contacts = [];
  let sendResults = [];

  // ── Tab switching ───────────────────────────────────────────
  function showTab(name) {
    ['launch','status','config'].forEach(t => {
      document.getElementById('panel-' + t).style.display = t === name ? 'block' : 'none';
      document.getElementById('tab-btn-' + t).classList.toggle('active', t === name);
    });
  }

  // ── Load contacts from Zoho CRM ─────────────────────────────
  async function loadContacts() {
    const campaignId = document.getElementById('campaignId').value.trim();
    if (!campaignId) { alert('הזן מזהה קמפיין תחילה'); return; }
    const list = document.getElementById('contacts-list');
    list.innerHTML = '<div class="empty">⏳ טוען אנשי קשר מ-Zoho CRM...</div>';
    try {
      const res = await fetch(API_BASE + '/api/scheduling/campaign/' + encodeURIComponent(campaignId) + '/contacts');
      const data = await res.json();
      if (!data.success) throw new Error(data.error || 'שגיאה בטעינת אנשי קשר');
      contacts = data.contacts || [];
      renderContacts(contacts);
      document.getElementById('launch-btn').disabled = contacts.length === 0;
    } catch (e) {
      list.innerHTML = '<div class="empty" style="color:#f87171;">❌ ' + e.message + '</div>';
    }
  }

  // ── Handle CSV upload ───────────────────────────────────────
  function handleCSV(event) {
    const file = event.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (e) => {
      const lines = e.target.result.split('\n').filter(l => l.trim());
      const headers = lines[0].split(',').map(h => h.trim().toLowerCase());
      const nameIdx = headers.findIndex(h => h.includes('name') || h.includes('שם'));
      const phoneIdx = headers.findIndex(h => h.includes('phone') || h.includes('טלפון') || h.includes('mobile'));
      const langIdx = headers.findIndex(h => h.includes('lang') || h.includes('שפה'));
      const idIdx = headers.findIndex(h => h.includes('id') || h.includes('contact'));
      contacts = lines.slice(1).map((line, i) => {
        const cols = line.split(',').map(c => c.trim().replace(/^"|"$/g, ''));
        return {
          id: idIdx >= 0 ? cols[idIdx] : 'csv_' + i,
          name: nameIdx >= 0 ? cols[nameIdx] : 'איש קשר ' + (i + 1),
          phone: phoneIdx >= 0 ? cols[phoneIdx] : '',
          language: langIdx >= 0 ? cols[langIdx] : 'he'
        };
      }).filter(c => c.phone);
      renderContacts(contacts);
      document.getElementById('launch-btn').disabled = contacts.length === 0;
    };
    reader.readAsText(file, 'UTF-8');
  }

  function renderContacts(list) {
    const el = document.getElementById('contacts-list');
    const count = document.getElementById('contacts-count');
    if (!list.length) {
      el.innerHTML = '<div class="empty">אין אנשי קשר</div>';
      count.textContent = '';
      return;
    }
    el.innerHTML = list.map(c => {
      const status = sendResults.find(r => r.phone === c.phone);
      const badge = status
        ? (status.success
            ? '<span class="badge badge-sent">✓ נשלח</span>'
            : '<span class="badge badge-error">✗ שגיאה</span>')
        : '<span class="badge badge-pending">ממתין</span>';
      return '<div class="contact-row">'
        + '<span class="contact-name">' + (c.name || 'לא ידוע') + '</span>'
        + '<span class="contact-phone">' + (c.phone || '') + '</span>'
        + badge
        + '</div>';
    }).join('');
    count.textContent = list.length + ' אנשי קשר';
  }

  // ── Launch bot ──────────────────────────────────────────────
  async function launchBot() {
    const campaignId = document.getElementById('campaignId').value.trim();
    const meetingType = document.getElementById('meetingType').value;
    const language = document.getElementById('language').value;
    const customTemplate = document.getElementById('customTemplate').value.trim();
    if (!campaignId) { alert('הזן מזהה קמפיין'); return; }
    if (!contacts.length) { alert('טען אנשי קשר תחילה'); return; }
    if (!confirm('להפעיל בוט תיאום ל-' + contacts.length + ' אנשי קשר?')) return;

    const btn = document.getElementById('launch-btn');
    const statusEl = document.getElementById('launch-status');
    const progressWrap = document.getElementById('progress-wrap');
    const progressBar = document.getElementById('progress-bar');
    btn.disabled = true;
    progressWrap.style.display = 'block';
    statusEl.className = 'status-bar loading';
    statusEl.textContent = '⏳ שולח הודעות...';
    sendResults = [];

    // Prepare contacts with language override
    const contactsToSend = contacts.map(c => ({
      ...c,
      language: language === 'both' ? c.language || 'he' : language
    }));

    // First ensure campaign config exists
    try {
      await fetch(API_BASE + '/api/scheduling/campaign/' + encodeURIComponent(campaignId), {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          meeting_type: meetingType,
          wa_language: language === 'both' ? 'he' : language,
          wa_initial_template: customTemplate || '',
          slot_duration_minutes: 45,
          reminder_delay_hours: 24,
          bot_followup_delay_hours: 48
        })
      });
    } catch (e) { /* non-fatal */ }

    // Send broadcast
    try {
      const res = await fetch(API_BASE + '/api/scheduling/broadcast', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ campaignId, contacts: contactsToSend })
      });
      const data = await res.json();
      progressBar.style.width = '100%';
      if (data.sent !== undefined) {
        sendResults = contactsToSend.map(c => ({ phone: c.phone, success: true }));
        renderContacts(contacts);
        statusEl.className = 'status-bar success';
        statusEl.textContent = '✅ נשלחו ' + data.sent + ' הודעות' + (data.failed ? ' | נכשלו: ' + data.failed : '') + ' | סה"כ: ' + data.total;
      } else {
        throw new Error(data.error || 'שגיאה לא ידועה');
      }
    } catch (e) {
      statusEl.className = 'status-bar error';
      statusEl.textContent = '❌ שגיאה: ' + e.message;
    }
    btn.disabled = false;
  }

  // ── Load status ─────────────────────────────────────────────
  async function loadStatus() {
    const campaignId = document.getElementById('status-campaignId').value.trim();
    if (!campaignId) { alert('הזן מזהה קמפיין'); return; }
    const statusEl = document.getElementById('status-bar');
    statusEl.className = 'status-bar loading';
    statusEl.textContent = '⏳ טוען סטטוס...';
    document.getElementById('status-kpis').style.display = 'none';
    document.getElementById('status-contacts-section').style.display = 'none';
    try {
      const res = await fetch(API_BASE + '/api/scheduling/campaign/' + encodeURIComponent(campaignId) + '/stats');
      const data = await res.json();
      const sessions = data.botSessions || [];
      const slots = data.meetingSlots || [];
      const total = sessions.reduce((a, b) => a + parseInt(b.count || 0), 0);
      const confirmed = sessions.find(s => s.state === 'confirmed');
      const pending = sessions.filter(s => !['confirmed','declined','cancelled'].includes(s.state));
      const declined = sessions.find(s => s.state === 'declined');
      const confirmedSlots = slots.find(s => s.status === 'confirmed');
      const kpis = document.getElementById('status-kpis');
      kpis.style.display = 'grid';
      kpis.innerHTML = [
        { label: 'סה"כ', val: total, cls: 'blue' },
        { label: 'מאושר', val: parseInt(confirmed?.count || 0), cls: 'green' },
        { label: 'ממתין', val: pending.reduce((a,b) => a + parseInt(b.count || 0), 0), cls: 'yellow' },
        { label: 'סירב', val: parseInt(declined?.count || 0), cls: 'red' },
        { label: 'פגישות', val: parseInt(confirmedSlots?.count || 0), cls: 'green' },
        { label: 'פנויים', val: parseInt(slots.find(s => s.status === 'open')?.count || 0), cls: 'blue' }
      ].map(k => '<div class="kpi"><div class="kpi-val ' + k.cls + '">' + k.val + '</div><div class="kpi-label">' + k.label + '</div></div>').join('');

      // Load contacts for this campaign
      const cRes = await fetch(API_BASE + '/api/scheduling/campaign/' + encodeURIComponent(campaignId) + '/contacts');
      const cData = await cRes.json();
      if (cData.success && cData.contacts?.length) {
        document.getElementById('status-contacts-section').style.display = 'block';
        const stateMap = { confirmed: 'badge-confirmed', pending: 'badge-pending', declined: 'badge-declined', sent: 'badge-sent' };
        document.getElementById('status-contacts-list').innerHTML = (cData.contacts || []).map(c => {
          const badgeCls = stateMap[c.status] || 'badge-pending';
          const label = { confirmed: 'מאושר', pending: 'ממתין', declined: 'סירב', sent: 'נשלח' }[c.status] || c.status;
          return '<div class="contact-row"><span class="contact-name">' + (c.name || 'לא ידוע') + '</span><span class="contact-phone">' + (c.phone || '') + '</span><span class="badge ' + badgeCls + '">' + label + '</span></div>';
        }).join('');
      }

      statusEl.className = 'status-bar success';
      statusEl.textContent = '✅ נטען בהצלחה';
    } catch (e) {
      statusEl.className = 'status-bar error';
      statusEl.textContent = '❌ ' + e.message;
    }
  }

  // ── Save config ─────────────────────────────────────────────
  async function saveConfig() {
    const campaignId = document.getElementById('cfg-campaignId').value.trim();
    if (!campaignId) { alert('הזן מזהה קמפיין'); return; }
    const body = {
      project_id: parseInt(document.getElementById('cfg-projectId').value) || null,
      slot_duration_minutes: parseInt(document.getElementById('cfg-slotDuration').value) || 45,
      buffer_minutes: parseInt(document.getElementById('cfg-buffer').value) || 15,
      reminder_delay_hours: parseInt(document.getElementById('cfg-reminder').value) || 24,
      bot_followup_delay_hours: parseInt(document.getElementById('cfg-vapi').value) || 48,
      wa_language: document.getElementById('cfg-lang').value
    };
    const statusEl = document.getElementById('config-status');
    statusEl.className = 'status-bar loading';
    statusEl.textContent = '⏳ שומר...';
    try {
      const res = await fetch(API_BASE + '/api/scheduling/campaign/' + encodeURIComponent(campaignId), {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
      const data = await res.json();
      if (data.success) {
        statusEl.className = 'status-bar success';
        statusEl.textContent = '✅ הגדרות נשמרו בהצלחה';
      } else {
        throw new Error(data.error || 'שגיאה');
      }
    } catch (e) {
      statusEl.className = 'status-bar error';
      statusEl.textContent = '❌ ' + e.message;
    }
  }

  // ── Auto-fill campaign ID from Zoho CRM context ─────────────
  // When embedded as a Zoho CRM widget, ZOHO.CRM.API is available
  if (typeof ZOHO !== 'undefined' && ZOHO.embeddedApp) {
    ZOHO.embeddedApp.on('PageLoad', function(data) {
      const entity = data?.Entity;
      const entityId = data?.EntityId?.[0] || data?.EntityId;
      if (entity === 'Campaigns' && entityId) {
        document.getElementById('campaignId').value = entityId;
        document.getElementById('status-campaignId').value = entityId;
        document.getElementById('cfg-campaignId').value = entityId;
        // Auto-load contacts
        loadContacts();
      }
    });
    ZOHO.embeddedApp.init();
  }
</script>
